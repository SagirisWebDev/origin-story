# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "723113567fcc4b3432f73fa36cb45e68"
name = "OriginStory"
application_url = "https://originstory.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions_update"

  [webhooks.privacy_compliance]
  customer_data_request_url = "/webhooks/customers/data_request"
  customer_deletion_url = "/webhooks/customers/redact"
  shop_deletion_url = "/webhooks/shop/redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[auth]
redirect_urls = [
  "https://originstory.fly.dev/auth/callback",
  "https://originstory.fly.dev/auth/shopify/callback",
  "https://originstory.fly.dev/api/auth/callback"
]

[metaobjects.app.product_story]
name = "Product Story"
description = "A product's origin story, surfaced to shoppers via a scannable QR code"

  [metaobjects.app.product_story.access]
  admin = "merchant_read_write"

[metaobjects.app.product_story.fields.product]
name = "Product"
type = "product_reference"
required = true

[metaobjects.app.product_story.fields.origin]
name = "Origin"
type = "single_line_text_field"
required = true

[metaobjects.app.product_story.fields.maker]
name = "Maker"
type = "single_line_text_field"
required = true

[metaobjects.app.product_story.fields.process]
name = "Process"
type = "multi_line_text_field"
required = true

[metaobjects.app.product_story.fields.story]
name = "Story"
type = "multi_line_text_field"
required = true

[metaobjects.app.product_story.fields.hero_image]
name = "Hero Image"
type = "file_reference"

[metaobjects.app.product_story.fields.custom_fields]
name = "Custom Fields"
description = "Paid-tier extras: a JSON-encoded array of { label, value } pairs."
type = "json"
